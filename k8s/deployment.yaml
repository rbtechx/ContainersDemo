apiVersion: apps/v1
kind: Deployment
metadata:
  name: ip-ranges-api
  labels:
    app: ip-ranges-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ip-ranges-api
  template:
    metadata:
      labels:
        app: ip-ranges-api
    spec:
      # Run as non-root (matches Dockerfile USER)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: ip-ranges-api
          image: ip-ranges-api:latest   # replace with your registry/image:tag
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

# ─────────────────────────────────────────────────────────────────────────────
# Azure AKS Ingress — uses the NGINX Ingress Controller
# https://learn.microsoft.com/en-us/azure/aks/ingress-basic
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ip-ranges-api-aks
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ip-ranges-api
                port:
                  number: 80
